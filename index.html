<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>김프 스캐너</title>
  <style>
    body { margin: 0; padding: 0; }
  </style>
</head>
<body>
  <!-- dashboard_mobile.html의 내용을 직접 로드 -->
  <iframe 
    id="app" 
    src="dashboard_mobile.html" 
    style="border:none; width:100%; height:100vh; margin:0; padding:0;"
    title="김프 스캐너">
  </iframe>
  
  <script>
    // iframe 높이 자동 조정
    document.getElementById('app').onload = function() {
      try {
        this.style.height = (this.contentWindow.document.body.scrollHeight) + 'px';
      } catch(e) {
        // CORS 에러 무시
      }
    };
  </script>
</body>
</html>
